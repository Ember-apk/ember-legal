<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ember — Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #c8b8a8;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      line-height: 1.8;
      padding: 60px 20px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }
    .logo { color: #FF6A00; font-size: 28px; margin-bottom: 8px; }
    .tagline { color: #555; font-size: 10px; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 60px; }
    .links { display: flex; flex-direction: column; gap: 16px; align-items: center; margin-bottom: 60px; }
    a {
      color: #c8b8a8;
      text-decoration: none;
      border: 1px solid rgba(255,106,0,0.2);
      padding: 14px 40px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      transition: border-color 0.2s;
      width: 280px;
    }
    a:hover { border-color: #FF6A00; color: #FF6A00; }
    .footer { color: #333; font-size: 10px; letter-spacing: 2px; }
  </style>
</head>
<body>

<div class="logo">🔥 ember</div>
<div class="tagline">messages that burn</div>

<div class="links">
  <a href="privacy.html">Privacy Policy</a>
  <a href="terms.html">Terms of Use</a>
  <a href="mailto:emberproject.app@gmail.com">Contact</a>
</div>

<div class="footer">
  <p>Ember Project · Romania · 2026</p>
  <p style="margin-top:6px">Available on Android</p>
</div>

</body>
</html>
